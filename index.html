<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doğanlar Mobilya - SEO Analiz Paneli</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --kelebek: #E74C3C;
    --lovayatak: #3498DB;
    --dogtas: #2ECC71;
    --genel: #34495E;
    --sidebar-bg: #1A252F;
    --sidebar-hover: #243342;
    --sidebar-active: #2C3E50;
    --nav-bg: #0F1923;
    --content-bg: #F4F6F8;
    --card-bg: #FFFFFF;
    --text-primary: #2C3E50;
    --text-secondary: #7F8C8D;
    --border: #E0E6ED;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-md: 0 4px 20px rgba(0,0,0,0.12);
    --radius: 8px;
    --radius-lg: 12px;
  }

  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

  body {
    display: flex;
    flex-direction: column;
    background: var(--content-bg);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
  }

  /* NAV */
  nav {
    background: var(--nav-bg);
    display: flex;
    align-items: center;
    padding: 0 24px;
    height: 58px;
    flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    gap: 4px;
    z-index: 100;
  }
  .nav-brand {
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-right: 28px;
    white-space: nowrap;
    opacity: 0.95;
  }
  .nav-brand span { opacity: 0.6; font-weight: 400; font-size: 13px; display: block; margin-top: 1px; }
  .nav-tabs { display: flex; gap: 4px; }
  .nav-tab {
    padding: 8px 20px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.3px;
    transition: all 0.2s;
    color: rgba(255,255,255,0.65);
    background: transparent;
  }
  .nav-tab:hover { background: rgba(255,255,255,0.08); color: #fff; }
  .nav-tab.active { color: #fff; }
  .nav-tab[data-brand="genel"].active { background: var(--genel); }
  .nav-tab[data-brand="kelebek"].active { background: var(--kelebek); }
  .nav-tab[data-brand="lovayatak"].active { background: var(--lovayatak); }
  .nav-tab[data-brand="dogtas"].active { background: var(--dogtas); color: #0F1923; }
  .nav-tab[data-brand="rakipler"].active { background: #9B59B6; }

  /* LAYOUT */
  .app-body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR */
  aside {
    width: 270px;
    background: var(--sidebar-bg);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: #2C3E50 transparent;
  }
  aside::-webkit-scrollbar { width: 4px; }
  aside::-webkit-scrollbar-thumb { background: #2C3E50; border-radius: 4px; }

  .sidebar-header {
    padding: 20px 18px 12px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .sidebar-brand-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.35);
    margin-bottom: 6px;
  }
  .sidebar-brand-name {
    font-size: 16px;
    font-weight: 700;
    color: #fff;
  }

  .sidebar-kpi {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 14px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .kpi-chip {
    background: rgba(255,255,255,0.05);
    border-radius: 6px;
    padding: 8px 10px;
  }
  .kpi-chip .kpi-val {
    font-size: 14px;
    font-weight: 700;
    color: #fff;
    line-height: 1;
  }
  .kpi-chip .kpi-lbl {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    margin-top: 3px;
  }

  .sidebar-docs { padding: 10px 10px; }
  .sidebar-section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: rgba(255,255,255,0.3);
    padding: 8px 8px 6px;
  }
  .sidebar-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    color: rgba(255,255,255,0.6);
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
    margin-bottom: 2px;
  }
  .sidebar-item:hover { background: var(--sidebar-hover); color: rgba(255,255,255,0.9); }
  .sidebar-item.active { background: var(--sidebar-active); color: #fff; }
  .sidebar-item.active .doc-icon { opacity: 1; }
  .doc-icon {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    opacity: 0.75;
  }
  .sidebar-item.active .doc-icon { opacity: 1; }

  /* MAIN CONTENT */
  main {
    flex: 1;
    overflow-y: auto;
    padding: 28px 32px;
    scrollbar-width: thin;
    scrollbar-color: #CBD5E0 transparent;
  }
  main::-webkit-scrollbar { width: 6px; }
  main::-webkit-scrollbar-thumb { background: #CBD5E0; border-radius: 4px; }

  .content-header {
    margin-bottom: 24px;
  }
  .content-header h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 4px;
  }
  .content-header p {
    font-size: 13px;
    color: var(--text-secondary);
  }
  .brand-accent {
    display: inline-block;
    width: 4px;
    height: 22px;
    border-radius: 2px;
    margin-right: 10px;
    vertical-align: middle;
    position: relative;
    top: -1px;
  }

  /* ACTION BUTTONS */
  .action-bar {
    display: flex;
    gap: 8px;
    flex-shrink: 0;
  }
  .action-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: white;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.15s;
    white-space: nowrap;
    font-family: inherit;
  }
  .action-btn:hover { background: var(--content-bg); }
  .action-btn.sheets { color: #34A853; border-color: #34A853; }
  .action-btn.sheets:hover { background: #E8F5E9; }
  .action-btn.csv { color: #566573; }
  .action-btn.csv:hover { background: var(--content-bg); }

  /* TABLE */
  .table-wrap {
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    overflow: hidden;
    overflow-x: auto;
  }
  .table-wrap table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  .table-wrap thead tr {
    background: #1A252F;
    color: rgba(255,255,255,0.9);
  }
  .table-wrap thead th {
    padding: 12px 16px;
    text-align: left;
    font-weight: 600;
    font-size: 12px;
    letter-spacing: 0.3px;
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
    position: relative;
  }
  .table-wrap thead th:hover { background: #243342; }
  .table-wrap thead th .sort-icon { opacity: 0.4; margin-left: 4px; font-size: 10px; }
  .table-wrap thead th.sorted-asc .sort-icon::after { content: ' \2191'; opacity: 1; }
  .table-wrap thead th.sorted-desc .sort-icon::after { content: ' \2193'; opacity: 1; }
  .table-wrap thead th .sort-icon::after { content: ' \2195'; }
  .table-wrap tbody tr { border-bottom: 1px solid var(--border); transition: background 0.12s; }
  .table-wrap tbody tr:last-child { border-bottom: none; }
  .table-wrap tbody tr:nth-child(even) { background: #FAFBFD; }
  .table-wrap tbody tr:hover { background: #EEF4FF; }
  .table-wrap tbody td { padding: 11px 16px; color: var(--text-primary); vertical-align: middle; }
  .table-wrap tbody td:first-child { font-weight: 600; }

  /* COLUMN RESIZER */
  .col-resizer {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 5px;
    cursor: col-resize;
    user-select: none;
    z-index: 1;
  }
  .col-resizer:hover,
  .col-resizer.resizing {
    background: rgba(52, 152, 219, 0.4);
  }

  /* BADGES */
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.2px;
  }
  .badge-kelebek { background: #FDECEA; color: var(--kelebek); }
  .badge-lovayatak { background: #E3F2FD; color: var(--lovayatak); }
  .badge-dogtas { background: #E8F8F0; color: #1E8449; }
  .badge-genel { background: #EBF0F4; color: var(--genel); }
  .badge-rakipler { background: #F4ECF7; color: #9B59B6; }
  .badge-kritik { background: #FDECEA; color: #C0392B; border: 1px solid #E74C3C; }
  .badge-cok-yuksek { background: #FEF5E7; color: #D35400; border: 1px solid #E67E22; }
  .badge-yuksek { background: #EBF5FB; color: #1A5276; border: 1px solid #3498DB; }
  .badge-orta { background: #F2F3F4; color: #566573; border: 1px solid #AEB6BF; }

  /* STRATEGY CARDS */
  .strategy-grid { display: flex; flex-direction: column; gap: 28px; }
  .strategy-section {
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .strategy-section-header {
    padding: 16px 22px;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .strategy-cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1px; background: var(--border); }
  .strategy-card {
    background: var(--card-bg);
    padding: 18px 20px;
    position: relative;
  }
  .strategy-card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
  .strategy-card-num {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 800;
    color: #fff;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .strategy-card h4 { font-size: 13px; font-weight: 700; color: var(--text-primary); line-height: 1.4; flex: 1; }
  .strategy-card p { font-size: 12px; color: var(--text-secondary); line-height: 1.6; }
  .strategy-common {
    background: var(--card-bg);
    padding: 20px 22px;
  }
  .strategy-common h4 { font-size: 13px; font-weight: 700; color: var(--text-primary); margin-bottom: 12px; }
  .strategy-common ul { display: flex; flex-wrap: wrap; gap: 8px; list-style: none; }
  .strategy-common ul li {
    background: var(--content-bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 500;
  }

  /* ANALYSIS TEXT SECTIONS */
  .analysis-sections { margin-top: 24px; display: flex; flex-direction: column; gap: 16px; }
  .analysis-card {
    background: var(--card-bg);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .analysis-card-header {
    padding: 12px 20px;
    background: #1A252F;
    color: rgba(255,255,255,0.9);
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.3px;
  }
  .analysis-card-header.kritik { background: #C0392B; }
  .analysis-card-body {
    padding: 16px 20px;
    font-size: 13px;
    line-height: 1.8;
    color: var(--text-primary);
  }
  .analysis-card-body ul { padding-left: 18px; }
  .analysis-card-body li { margin-bottom: 4px; }
  .analysis-card-body .kv-row {
    display: flex;
    gap: 12px;
    padding: 5px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .analysis-card-body .kv-row:last-child { border-bottom: none; }
  .analysis-card-body .kv-key { font-weight: 600; min-width: 160px; color: var(--text-secondary); }
  .analysis-card-body .kv-val { color: var(--text-primary); flex: 1; }

  /* ANALYSIS SUB-TABLE */
  .analysis-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
    margin: 8px 0;
  }
  .analysis-table thead {
    background: #F0F4F8;
  }
  .analysis-table th {
    padding: 10px 14px;
    text-align: left;
    font-weight: 700;
    font-size: 12px;
    color: var(--text-secondary);
    border-bottom: 2px solid var(--border);
  }
  .analysis-table td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  .analysis-table tr:last-child td {
    border-bottom: none;
  }
  .analysis-table .positive {
    color: #1E8449;
    font-weight: 600;
  }
  .analysis-table .negative {
    color: #C0392B;
    font-weight: 600;
  }

  /* URL pill */
  .url-pill {
    display: inline-block;
    background: #EEF4FF;
    color: #2471A3;
    border-radius: 4px;
    padding: 2px 6px;
    font-family: monospace;
    font-size: 11px;
    white-space: nowrap;
    vertical-align: middle;
  }

  /* Number formatting */
  .num-positive { color: #1E8449; font-weight: 600; }
  .num-neutral { color: var(--text-secondary); }

  /* Winner badge */
  .winner-kelebek { color: var(--kelebek); font-weight: 700; }
  .winner-dogtas { color: #1E8449; font-weight: 700; }
  .winner-lovayatak { color: var(--lovayatak); font-weight: 700; }

  /* DR bar */
  .dr-bar-wrap { display: flex; align-items: center; gap: 8px; }
  .dr-bar { height: 6px; border-radius: 3px; background: var(--border); flex: 1; max-width: 80px; overflow: hidden; }
  .dr-bar-fill { height: 100%; border-radius: 3px; }

  /* Poz highlight */
  .poz-top { color: #1E8449; font-weight: 700; }
  .poz-mid { color: #D35400; font-weight: 600; }
  .poz-low { color: var(--text-secondary); }

  /* status chips */
  .status-analiz { background: #EBF5FB; color: #1A5276; border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 700; }
  .status-rakip { background: #F2F3F4; color: #566573; border-radius: 4px; padding: 2px 8px; font-size: 11px; font-weight: 600; }

  /* Loading */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 300px;
    gap: 16px;
    color: var(--text-secondary);
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--genel);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .error-box {
    background: #FDECEA;
    border: 1px solid #E74C3C;
    border-radius: var(--radius);
    padding: 20px 24px;
    color: #922B21;
    font-size: 13px;
  }
  .error-box strong { display: block; margin-bottom: 6px; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: #1A252F;
    color: white;
    padding: 14px 22px;
    border-radius: 8px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    font-size: 13px;
    z-index: 9999;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s ease;
    max-width: 380px;
    line-height: 1.5;
    pointer-events: none;
  }
  .toast.show {
    transform: translateY(0);
    opacity: 1;
  }

  /* Responsive */
  @media (max-width: 900px) {
    aside { width: 220px; }
    main { padding: 18px 16px; }
  }
  @media (max-width: 680px) {
    .nav-brand span { display: none; }
    aside { width: 60px; }
    .sidebar-item .doc-name, .sidebar-brand-label, .sidebar-brand-name, .kpi-chip .kpi-lbl, .kpi-chip .kpi-val, .sidebar-section-label { display: none; }
    .sidebar-kpi { display: none; }
    .sidebar-docs { padding: 10px 4px; }
    .sidebar-item { justify-content: center; padding: 12px; }
    .doc-icon { margin: 0; }
    .action-bar { flex-direction: column; }
  }

  /* COLUMN FILTERS */
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; padding: 12px 16px; background: #F8F9FA; border-radius: 8px; border: 1px solid var(--border); align-items: center; }
  .filter-row .filter-label { font-size: 11px; font-weight: 700; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-right: 4px; }
  .filter-chip { position: relative; display: inline-flex; }
  .filter-chip-btn {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
    background: white; cursor: pointer; font-size: 11px; font-weight: 600;
    color: var(--text-secondary); transition: all 0.15s; font-family: inherit;
    white-space: nowrap;
  }
  .filter-chip-btn:hover { border-color: #3498DB; color: #3498DB; }
  .filter-chip-btn.has-filter { background: #EBF5FB; border-color: #3498DB; color: #2471A3; }
  .filter-chip-btn .filter-count { background: #3498DB; color: white; border-radius: 50%; width: 16px; height: 16px; font-size: 9px; display: inline-flex; align-items: center; justify-content: center; margin-left: 2px; }
  .filter-dropdown {
    position: absolute; top: 100%; left: 0; z-index: 999;
    background: white; border: 1px solid var(--border); border-radius: 8px;
    box-shadow: var(--shadow-md); min-width: 200px; max-height: 280px;
    overflow-y: auto; padding: 8px 0; margin-top: 4px; display: none;
  }
  .filter-dropdown.show { display: block; }
  .filter-dropdown .filter-search { width: calc(100% - 16px); margin: 0 8px 6px; padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 12px; font-family: inherit; outline: none; }
  .filter-dropdown .filter-search:focus { border-color: #3498DB; }
  .filter-dropdown label { display: flex; align-items: center; gap: 8px; padding: 5px 12px; font-size: 12px; cursor: pointer; transition: background 0.1s; }
  .filter-dropdown label:hover { background: #F0F4F8; }
  .filter-dropdown label input[type="checkbox"] { accent-color: #3498DB; }
  .filter-actions { display: flex; gap: 6px; padding: 6px 8px; border-top: 1px solid var(--border); margin-top: 4px; }
  .filter-actions button { flex: 1; padding: 5px 8px; border-radius: 4px; border: 1px solid var(--border); background: white; cursor: pointer; font-size: 11px; font-weight: 600; font-family: inherit; }
  .filter-actions .apply-btn { background: #3498DB; color: white; border-color: #3498DB; }
  .filter-actions .clear-btn { color: var(--text-secondary); }
  .filter-reset-btn { padding: 5px 12px; border-radius: 20px; border: 1px solid #E74C3C; background: #FDECEA; color: #C0392B; cursor: pointer; font-size: 11px; font-weight: 600; font-family: inherit; display: none; }
  .filter-reset-btn.show { display: inline-flex; }

  /* EXPAND TOGGLE (referring domains) */
  .expand-toggle {
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 20px;
    height: 20px;
    border-radius: 4px;
    border: none;
    background: none;
    font-size: 10px;
    color: var(--text-secondary);
    transition: all 0.15s;
    margin-right: 6px;
    flex-shrink: 0;
  }
  .expand-toggle:hover { background: #EEF4FF; color: #2471A3; }
  .expand-toggle.open { transform: rotate(90deg); }
  .slug-row { display: none; }
  .slug-row.open { display: table-row; }
  .slug-row td {
    padding: 6px 16px 6px 48px !important;
    background: #F8FAFC !important;
    font-size: 12px;
    color: var(--text-secondary);
    border-bottom: 1px solid var(--border);
  }
  .slug-url {
    display: block;
    font-family: monospace;
    font-size: 11px;
    color: #2471A3;
    padding: 2px 0;
  }

  /* Footer */
  footer {
    background: var(--nav-bg);
    text-align: center;
    padding: 10px;
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    flex-shrink: 0;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<nav>
  <div class="nav-brand">Doğanlar Mobilya <span>SEO Analiz Paneli</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-brand="genel" onclick="switchBrand('genel')">Genel</button>
    <button class="nav-tab" data-brand="kelebek" onclick="switchBrand('kelebek')">Kelebek</button>
    <button class="nav-tab" data-brand="lovayatak" onclick="switchBrand('lovayatak')">Lovayatak</button>
    <button class="nav-tab" data-brand="dogtas" onclick="switchBrand('dogtas')">Doğtaş</button>
    <button class="nav-tab" data-brand="rakipler" onclick="switchBrand('rakipler')">Rakipler</button>
  </div>
</nav>

<div class="app-body">
  <aside id="sidebar"></aside>

// =====================================================================
// FETCH + PARSE
// =====================================================================
const cache = new Map();

async function loadDoc(filename) {
  if (cache.has(filename)) return cache.get(filename);
  const resp = await fetch('./seo-analiz/' + filename);
  if (!resp.ok) throw new Error('HTTP ' + resp.status + ' - ' + filename);
  const text = await resp.text();
  const parsed = parseTSV(text, filename);
  cache.set(filename, { raw: text, parsed });
  return cache.get(filename);
}

function parseTSV(text, filename) {
  // Split into raw lines (keep empty lines as markers)
  const allLines = text.split('\n');

  // Strip trailing empty lines
  let lastNonEmpty = allLines.length - 1;
  while (lastNonEmpty >= 0 && allLines[lastNonEmpty].trim() === '') lastNonEmpty--;
  const lines = allLines.slice(0, lastNonEmpty + 1);

  if (lines.length === 0) return { headers: [], rows: [], textContent: '' };

  // Determine header tab count
  const headerTabs = (lines[0].match(/\t/g) || []).length;

  let tableLines = [];
  let textLines = [];
  let inTable = true;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (inTable) {
      // Empty line signals end of table section
      if (line.trim() === '') {
        inTable = false;
        continue;
      }
      const tabCount = (line.match(/\t/g) || []).length;
      // Accept lines with similar tab density (allow -1 tolerance)
      if (tabCount >= headerTabs - 1) {
        tableLines.push(line);
      } else {
        inTable = false;
        textLines.push(line);
      }
    } else {
      textLines.push(line);
    }
  }

  const headers = tableLines[0] ? tableLines[0].split('\t').map(h => h.trim()) : [];
  const rows = tableLines.slice(1).map(l => l.split('\t').map(c => c.trim()));

  return { headers, rows, textContent: textLines.join('\n'), raw: text };
}

// =====================================================================
// CELL RENDERING HELPERS
// =====================================================================
function fmtNum(n) {
  if (n === null || n === undefined || n === '' || n === '-') return '<span class="num-neutral">-</span>';
  const str = String(n).trim();
  if (str === '-') return '<span class="num-neutral">-</span>';
  const num = parseFloat(str.replace(/[^0-9.-]/g, ''));
  if (isNaN(num)) return escHtml(str);
  return num.toLocaleString('tr-TR');
}

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function pozClass(p) {
  const n = parseInt(p);
  if (isNaN(n)) return 'poz-low';
  if (n <= 3) return 'poz-top';
  if (n <= 10) return 'poz-mid';
  return 'poz-low';
}

function drBar(dr, color) {
  const pct = Math.min(100, (parseFloat(dr) / 100) * 100);
  if (isNaN(pct)) return escHtml(dr);
  return '<div class="dr-bar-wrap"><strong>' + escHtml(String(dr)) + '</strong><div class="dr-bar"><div class="dr-bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div></div>';
}

function winnerBadge(w) {
  if (!w || w === '-') return '<span class="num-neutral">-</span>';
  const lw = w.toLowerCase();
  const cls = lw.includes('kelebek') ? 'winner-kelebek' :
              lw.includes('dogtas') ? 'winner-dogtas' :
              lw.includes('lova') ? 'winner-lovayatak' : '';
  return '<span class="' + cls + '">' + escHtml(w) + '</span>';
}

// =====================================================================
// SMART COLUMN TYPE DETECTION
// =====================================================================
function detectColType(header) {
  const h = header.toLowerCase();
  if (/volume|hacim|trafik|backlink|kw\b|refdomains|ref\s?domain|link\s?sayisi|toplam\s?link|dofollow/.test(h)) return 'num';
  if (/\bpoz(isyon)?\b/.test(h)) return 'poz';
  if (/\burl\b/.test(h)) return 'url';
  if (/\bdr\b/.test(h)) return 'dr';
  if (/kazanan|winner/.test(h)) return 'winner';
  if (/durum/.test(h)) return 'status';
  if (/cpc/.test(h)) return 'num';
  if (/organik\s?kw|org\.\s?kw/.test(h)) return 'num';
  if (/org\.\s?trafik|aylik\s?trafik|rakip\s?trafik/.test(h)) return 'num';
  return 'text';
}

function renderCellAuto(value, colType, colHeader) {
  const v = String(value).trim();
  if (v === '-' || v === '') return '<span class="num-neutral">-</span>';

  switch (colType) {
    case 'num': {
      const num = parseFloat(v.replace(/[^0-9.-]/g, ''));
      if (isNaN(num)) return escHtml(v);
      return num.toLocaleString('tr-TR');
    }
    case 'poz': {
      const n = parseInt(v);
      if (isNaN(n)) return '<span class="num-neutral">-</span>';
      return '<span class="' + pozClass(n) + '">' + n + '</span>';
    }
    case 'url':
      return '<span class="url-pill">' + escHtml(v) + '</span>';
    case 'dr': {
      const drColor = '#7F8C8D';
      return drBar(v, drColor);
    }
    case 'winner':
      return winnerBadge(v);
    case 'status': {
      const cls = v.toLowerCase().includes('analiz') ? 'status-analiz' : 'status-rakip';
      return '<span class="' + cls + '">' + escHtml(v) + '</span>';
    }
    default:
      return escHtml(v);
  }
}

// =====================================================================
// SORTABLE TABLE BUILDER
// =====================================================================
let tableCounter = 0;

function buildTable(headers, rows, filename) {
  if (!headers || headers.length === 0) return '<p style="color:var(--text-secondary);font-size:13px;padding:12px">Tablo verisi bulunamadı.</p>';

  const id = 'tbl_' + (++tableCounter);
  const colTypes = headers.map(h => detectColType(h));

  // Detect if this is a referring_domains file
  const isRefDomains = filename && filename.includes('referring_domains');

  // Find "Top Sayfalar" column index if present
  const topSayfalarIdx = headers.findIndex(h => /top\s*sayfa/i.test(h));

  const state = { sortCol: -1, sortDir: 1, filters: {} };

  // Determine which columns are filterable
  function isNumericCol(ci) {
    return ['num', 'poz', 'dr'].includes(colTypes[ci]);
  }

  // Get unique values for a column
  function getUniqueValues(ci) {
    const vals = new Set();
    rows.forEach(r => {
      const v = (r[ci] || '').trim();
      if (v && v !== '-') vals.add(v);
    });
    return [...vals].sort((a, b) => {
      const an = parseFloat(a.replace(/[^0-9.-]/g, '')), bn = parseFloat(b.replace(/[^0-9.-]/g, ''));
      if (!isNaN(an) && !isNaN(bn)) return an - bn;
      return a.localeCompare(b, 'tr');
    });
  }

  function filteredRows() {
    return rows.filter(r => {
      for (const ci in state.filters) {
        const f = state.filters[ci];
        if (!f || f.size === 0) continue;
        const val = (r[ci] || '').trim();
        if (!f.has(val)) return false;
      }
      return true;
    });
  }

  function sortedRows() {
    const filtered = filteredRows();
    if (state.sortCol < 0) return filtered;
    return [...filtered].sort((a, b) => {
      const av = (a[state.sortCol] || '').replace(/[^0-9.-]/g, '');
      const bv = (b[state.sortCol] || '').replace(/[^0-9.-]/g, '');
      const an = parseFloat(av), bn = parseFloat(bv);
      if (!isNaN(an) && !isNaN(bn)) return state.sortDir * (an - bn);
      return state.sortDir * String(a[state.sortCol] || '').localeCompare(String(b[state.sortCol] || ''), 'tr');
    });
  }

  function hasActiveFilters() {
    return Object.keys(state.filters).some(k => state.filters[k] && state.filters[k].size > 0);
  }

  function renderFilterRow() {
    let html = '<div class="filter-row" id="filters_' + id + '">';
    html += '<span class="filter-label">Filtre:</span>';

    headers.forEach((h, ci) => {
      const uniqueVals = getUniqueValues(ci);
      if (uniqueVals.length < 2 || uniqueVals.length > 500) return; // Skip useless filters

      const filterActive = state.filters[ci] && state.filters[ci].size > 0;
      const activeCount = filterActive ? state.filters[ci].size : 0;

      html += '<div class="filter-chip" id="fc_' + id + '_' + ci + '">';
      html += '<button class="filter-chip-btn' + (filterActive ? ' has-filter' : '') + '" data-col="' + ci + '">';
      html += escHtml(h);
      if (activeCount > 0) html += ' <span class="filter-count">' + activeCount + '</span>';
      html += '</button>';
      html += '<div class="filter-dropdown" id="fd_' + id + '_' + ci + '">';

      if (uniqueVals.length > 8) {
        html += '<input type="text" class="filter-search" placeholder="Ara..." data-col="' + ci + '">';
      }

      uniqueVals.forEach(v => {
        const checked = filterActive && state.filters[ci].has(v) ? ' checked' : '';
        html += '<label><input type="checkbox" value="' + escHtml(v) + '" data-col="' + ci + '"' + checked + '>' + escHtml(v) + '</label>';
      });

      html += '<div class="filter-actions">';
      html += '<button class="clear-btn" data-col="' + ci + '">Temizle</button>';
      html += '<button class="apply-btn" data-col="' + ci + '">Uygula</button>';
      html += '</div></div></div>';
    });

    html += '<button class="filter-reset-btn' + (hasActiveFilters() ? ' show' : '') + '" id="freset_' + id + '">Tüm Filtreleri Temizle</button>';
    html += '</div>';
    return html;
  }

  function renderTable() {
    const data = sortedRows();
    const thead = headers.map((h, i) => {
      let cls = '';
      if (i === state.sortCol) cls = state.sortDir === 1 ? 'sorted-asc' : 'sorted-desc';
      return '<th class="' + cls + '" data-col="' + i + '">' + escHtml(h) + '<span class="sort-icon"></span><div class="col-resizer" data-col="' + i + '"></div></th>';
    }).join('');

    let tbody = '';
    data.forEach((r, rowIdx) => {
      let cells = '';
      headers.forEach((h, ci) => {
        // Skip the "Top Sayfalar" column from inline rendering (it's shown in slug-row)
        if (isRefDomains && ci === topSayfalarIdx) return;
        const val = r[ci] !== undefined ? r[ci] : '';
        let rendered = renderCellAuto(val, colTypes[ci], h);
        if (isRefDomains && ci === 0) {
          // Add expand toggle to first column (domain name)
          const slugRowId = 'slug_' + id + '_' + rowIdx;
          rendered = '<button class="expand-toggle" data-slug-row="' + slugRowId + '">&#9654;</button>' + rendered;
        }
        cells += '<td' + (ci === 0 ? ' style="font-weight:600"' : '') + '>' + rendered + '</td>';
      });
      tbody += '<tr>' + cells + '</tr>';

      // Slug sub-row for referring domains
      if (isRefDomains) {
        const slugRowId = 'slug_' + id + '_' + rowIdx;
        const colSpan = topSayfalarIdx >= 0 ? headers.length - 1 : headers.length;
        let slugContent = '';
        if (topSayfalarIdx >= 0 && r[topSayfalarIdx] && r[topSayfalarIdx].trim() && r[topSayfalarIdx].trim() !== '-') {
          const urls = r[topSayfalarIdx].split('|').map(u => u.trim()).filter(Boolean);
          slugContent = urls.map(u => '<span class="slug-url">' + escHtml(u) + '</span>').join('');
        } else {
          slugContent = '<span style="color:var(--text-secondary);font-style:italic">Veri mevcut değil</span>';
        }
        tbody += '<tr class="slug-row" id="' + slugRowId + '"><td colspan="' + colSpan + '">' + slugContent + '</td></tr>';
      }
    });

    const countInfo = hasActiveFilters() ?
      '<div style="padding:8px 16px;font-size:11px;color:var(--text-secondary);background:#F8F9FA;border-bottom:1px solid var(--border)">' + data.length + ' / ' + rows.length + ' sonuç gösteriliyor</div>' : '';

    return countInfo + '<table id="' + id + '"><thead><tr>' + thead + '</tr></thead><tbody>' + tbody + '</tbody></table>';
  }

  const html = renderFilterRow() + '<div class="table-wrap" id="wrap_' + id + '">' + renderTable() + '</div>';

  function fullRerender() {
    const wrap = document.getElementById('wrap_' + id);
    if (!wrap) return;
    wrap.innerHTML = renderTable();

    // Update filter UI
    const filterRow = document.getElementById('filters_' + id);
    if (filterRow) {
      filterRow.outerHTML = renderFilterRow();
      attachFilterListeners();
    }
    attachSortListeners();
    attachResizeListeners();
    attachExpandListeners();
  }

  function attachSortListeners() {
    const wrap = document.getElementById('wrap_' + id);
    if (!wrap) return;
    wrap.querySelectorAll('thead th').forEach(th => {
      th.addEventListener('click', (e) => {
        // Don't sort when clicking resizer
        if (e.target.classList.contains('col-resizer')) return;
        const col = parseInt(th.getAttribute('data-col'));
        if (state.sortCol === col) state.sortDir *= -1;
        else { state.sortCol = col; state.sortDir = 1; }
        fullRerender();
      });
    });
  }

  function attachResizeListeners() {
    const wrap = document.getElementById('wrap_' + id);
    if (!wrap) return;
    wrap.querySelectorAll('.col-resizer').forEach(resizer => {
      resizer.addEventListener('mousedown', (e) => {
        e.preventDefault();
        e.stopPropagation();
        const th = resizer.closest('th');
        const colIdx = parseInt(resizer.getAttribute('data-col'));
        const startX = e.clientX;
        const startWidth = th.offsetWidth;

        resizer.classList.add('resizing');

        function onMouseMove(me) {
          const newWidth = Math.max(40, startWidth + (me.clientX - startX));
          th.style.width = newWidth + 'px';
          // Also set the corresponding tbody td widths via col elements
          const tbl = document.getElementById(id);
          if (tbl) {
            tbl.querySelectorAll('tbody tr').forEach(row => {
              const tds = row.querySelectorAll('td:not([colspan])');
              if (tds[colIdx]) tds[colIdx].style.minWidth = newWidth + 'px';
            });
          }
        }

        function onMouseUp() {
          resizer.classList.remove('resizing');
          document.removeEventListener('mousemove', onMouseMove);
          document.removeEventListener('mouseup', onMouseUp);
        }

        document.addEventListener('mousemove', onMouseMove);
        document.addEventListener('mouseup', onMouseUp);
      });
    });
  }

  function attachExpandListeners() {
    if (!isRefDomains) return;
    const wrap = document.getElementById('wrap_' + id);
    if (!wrap) return;
    wrap.querySelectorAll('.expand-toggle').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const slugRowId = btn.getAttribute('data-slug-row');
        const slugRow = document.getElementById(slugRowId);
        if (!slugRow) return;
        const isOpen = slugRow.classList.contains('open');
        if (isOpen) {
          slugRow.classList.remove('open');
          btn.classList.remove('open');
        } else {
          slugRow.classList.add('open');
          btn.classList.add('open');
        }
      });
    });
  }

  function attachFilterListeners() {
    // Chip buttons toggle dropdowns
    document.querySelectorAll('#filters_' + id + ' .filter-chip-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const col = btn.getAttribute('data-col');
        const dd = document.getElementById('fd_' + id + '_' + col);
        const wasOpen = dd.classList.contains('show');
        // Close all dropdowns first
        document.querySelectorAll('#filters_' + id + ' .filter-dropdown').forEach(d => d.classList.remove('show'));
        if (!wasOpen) dd.classList.add('show');
      });
    });

    // Search within dropdown
    document.querySelectorAll('#filters_' + id + ' .filter-search').forEach(input => {
      input.addEventListener('input', e => {
        const col = input.getAttribute('data-col');
        const dd = document.getElementById('fd_' + id + '_' + col);
        const term = input.value.toLowerCase();
        dd.querySelectorAll('label').forEach(lbl => {
          lbl.style.display = lbl.textContent.toLowerCase().includes(term) ? '' : 'none';
        });
      });
    });

    // Apply buttons
    document.querySelectorAll('#filters_' + id + ' .apply-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const col = btn.getAttribute('data-col');
        const dd = document.getElementById('fd_' + id + '_' + col);
        const checked = dd.querySelectorAll('input[type="checkbox"]:checked');
        if (checked.length === 0) {
          delete state.filters[col];
        } else {
          state.filters[col] = new Set([...checked].map(cb => cb.value));
        }
        dd.classList.remove('show');
        fullRerender();
      });
    });

    // Clear buttons
    document.querySelectorAll('#filters_' + id + ' .clear-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const col = btn.getAttribute('data-col');
        delete state.filters[col];
        const dd = document.getElementById('fd_' + id + '_' + col);
        dd.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
        dd.classList.remove('show');
        fullRerender();
      });
    });

    // Reset all
    const resetBtn = document.getElementById('freset_' + id);
    if (resetBtn) {
      resetBtn.addEventListener('click', () => {
        state.filters = {};
        fullRerender();
      });
    }

    // Close dropdowns on outside click
    document.addEventListener('click', e => {
      if (!e.target.closest('#filters_' + id)) {
        document.querySelectorAll('#filters_' + id + ' .filter-dropdown').forEach(d => d.classList.remove('show'));
      }
    });
  }

  setTimeout(() => {
    attachSortListeners();
    attachResizeListeners();
    attachExpandListeners();
    attachFilterListeners();
  }, 0);

  return html;
}

// =====================================================================
// ANALYSIS TEXT RENDERER
// =====================================================================
function renderAnalysisText(textContent) {
  if (!textContent || textContent.trim() === '') return '';

  const lines = textContent.split('\n').filter(l => l.trim() !== '');
  if (lines.length === 0) return '';

  let sections = [];
  let currentSection = null;

  function flushSection() {
    if (currentSection) sections.push(currentSection);
    currentSection = null;
  }

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;

    // Detect section headers: ALL CAPS lines, or lines ending with ":"
    const isHeader = /^[A-Z\s\u00C0-\u017E\(\)\/]{4,}$/.test(line) ||
                     /^[A-Z\s]{3,}:/.test(line) ||
                     line.endsWith(':');

    const isKritik = line.toUpperCase().includes('KRITIK UYARI');

    if (isHeader) {
      flushSection();
      currentSection = { title: line, items: [], isKritik };
    } else {
      if (!currentSection) {
        currentSection = { title: '', items: [], isKritik: false };
      }
      currentSection.items.push(line);
    }
  }
  flushSection();

  let html = '<div class="analysis-sections">';
  sections.forEach(function(sec) {
    html += '<div class="analysis-card">';
    if (sec.title) {
      html += '<div class="analysis-card-header' + (sec.isKritik ? ' kritik' : '') + '">' + escHtml(sec.title) + '</div>';
    }
    if (sec.items.length > 0) {
      html += '<div class="analysis-card-body">';

      // Detect if items are tab-separated
      const hasKV = sec.items.some(function(it) { return it.includes('\t'); });

      if (hasKV) {
        // Check if this looks like a sub-table (avg 3+ tabs per row = 4+ columns)
        const tabCounts = sec.items.map(it => (it.match(/\t/g) || []).length);
        const avgTabs = tabCounts.reduce((a, b) => a + b, 0) / tabCounts.length;
        const isSubTable = avgTabs >= 3;

        if (isSubTable) {
          // Render as a comparison table
          const firstParts = sec.items[0].split('\t');
          // Heuristic: if first row looks like a header (contains known header keywords)
          const firstRowText = sec.items[0].toLowerCase();
          const looksLikeHeader = /metrik|fark|yorum|karsilastirma|karşılaştırma|alan|deger|değer/.test(firstRowText);

          html += '<table class="analysis-table">';
          if (looksLikeHeader) {
            html += '<thead><tr>';
            firstParts.forEach(p => {
              html += '<th>' + escHtml(p.trim()) + '</th>';
            });
            html += '</tr></thead><tbody>';
            sec.items.slice(1).forEach(item => {
              const parts = item.split('\t');
              html += '<tr>';
              parts.forEach((p) => {
                const trimmed = p.trim();
                let cls = '';
                if (trimmed.startsWith('+')) cls = ' class="positive"';
                else if (trimmed.startsWith('-') && !isNaN(parseFloat(trimmed.replace(/[^0-9.-]/g, '')))) cls = ' class="negative"';
                html += '<td' + cls + '>' + escHtml(trimmed) + '</td>';
              });
              html += '</tr>';
            });
            html += '</tbody>';
          } else {
            // No clear header row - render all rows as body
            html += '<tbody>';
            sec.items.forEach(item => {
              const parts = item.split('\t');
              html += '<tr>';
              parts.forEach((p) => {
                const trimmed = p.trim();
                let cls = '';
                if (trimmed.startsWith('+')) cls = ' class="positive"';
                else if (trimmed.startsWith('-') && !isNaN(parseFloat(trimmed.replace(/[^0-9.-]/g, '')))) cls = ' class="negative"';
                html += '<td' + cls + '>' + escHtml(trimmed) + '</td>';
              });
              html += '</tr>';
            });
            html += '</tbody>';
          }
          html += '</table>';
        } else {
          // Standard key-value rendering
          sec.items.forEach(function(item) {
            const parts = item.split('\t');
            if (parts.length >= 2) {
              html += '<div class="kv-row"><span class="kv-key">' + escHtml(parts[0]) + '</span><span class="kv-val">' + escHtml(parts.slice(1).join(' ')) + '</span></div>';
            } else {
              html += '<div class="kv-row">' + escHtml(item) + '</div>';
            }
          });
        }
      } else {
        html += '<ul>';
        sec.items.forEach(function(item) {
          html += '<li>' + escHtml(item) + '</li>';
        });
        html += '</ul>';
      }
      html += '</div>';
    }
    html += '</div>';
  });
  html += '</div>';
  return html;
}

// =====================================================================
// STRATEGY FILE 24 SPECIAL RENDERER
// =====================================================================
function renderStrategyFile(text) {
  const lines = text.split('\n');

  const brandSections = [];
  let commonItems = [];
  let currentBrand = null;
  let currentItems = [];
  let inCommon = false;

  function flushBrand() {
    if (currentBrand) {
      brandSections.push({ name: currentBrand, items: currentItems.slice() });
    }
    currentBrand = null;
    currentItems = [];
  }

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;

    // Brand section headers: === ... ===
    if (/^===.*===$/.test(line)) {
      const title = line.replace(/^===\s*/, '').replace(/\s*===$/, '').trim();
      if (/ORTAK|COMMON/i.test(title)) {
        flushBrand();
        inCommon = true;
      } else {
        flushBrand();
        inCommon = false;
        currentBrand = title;
      }
      continue;
    }

    if (inCommon) {
      // Common strategies: tab-separated rows or plain lines
      if (line.includes('\t')) {
        const parts = line.split('\t');
        commonItems.push(parts.join(' - '));
      } else {
        commonItems.push(line);
      }
    } else if (currentBrand !== null) {
      // Strategy item rows: tab-separated
      if (line.includes('\t')) {
        const parts = line.split('\t');
        // Skip header rows
        if (parts[0].toLowerCase() === 'oncelik' || parts[0].toLowerCase() === 'alan') continue;
        currentItems.push(parts);
      } else {
        // Plain text line under brand section
        currentItems.push([line, '', '', '', '', '']);
      }
    }
  }
  flushBrand();

  const brandColors = {
    kelebek: '#E74C3C',
    dogtas: '#2ECC71',
    lovayatak: '#3498DB'
  };
  const brandEmojis = {
    kelebek: '\uD83D\uDD34',
    dogtas: '\uD83D\uDFE2',
    lovayatak: '\uD83D\uDD35'
  };

  function etkiBadge(etki) {
    const e = String(etki || '').trim();
    const map = {
      'Kritik': 'badge-kritik',
      'Çok Yüksek': 'badge-cok-yuksek',
      'Cok Yuksek': 'badge-cok-yuksek',
      'Yüksek': 'badge-yuksek',
      'Yuksek': 'badge-yuksek',
      'Orta': 'badge-orta',
      'Düşük': 'badge-orta',
      'Dusuk': 'badge-orta'
    };
    const cls = map[e] || 'badge-orta';
    return e ? '<span class="badge ' + cls + '">' + escHtml(e) + '</span>' : '';
  }

  function getColor(name) {
    const n = name.toLowerCase();
    if (n.includes('kelebek')) return brandColors.kelebek;
    if (n.includes('dogtas')) return brandColors.dogtas;
    if (n.includes('lova')) return brandColors.lovayatak;
    return '#34495E';
  }

  function getEmoji(name) {
    const n = name.toLowerCase();
    if (n.includes('kelebek')) return brandEmojis.kelebek;
    if (n.includes('dogtas')) return brandEmojis.dogtas;
    if (n.includes('lova')) return brandEmojis.lovayatak;
    return '';
  }

  // If no === sections found, fall back to analysis text renderer
  if (brandSections.length === 0 && commonItems.length === 0) {
    return renderAnalysisText(text);
  }

  let html = '<div class="strategy-grid">';

  brandSections.forEach(function(section) {
    const color = getColor(section.name);
    const emoji = getEmoji(section.name);
    html += '<div class="strategy-section">';
    html += '<div class="strategy-section-header" style="background:' + color + '">' + emoji + ' ' + escHtml(section.name) + '</div>';
    html += '<div class="strategy-cards">';

    section.items.forEach(function(parts, idx) {
      // Expected columns: Oncelik | Alan | Mevcut Durum | Hedef | Aksiyon | Tahmini Etki
      // But we handle any number of columns
      const num = idx + 1;
      let title = '', desc = '', etki = '';
      if (Array.isArray(parts)) {
        if (parts.length >= 5) {
          // Oncelik, Alan, Mevcut, Hedef, Aksiyon, Etki
          title = parts[1] || parts[0] || '';
          desc = [parts[2], parts[3], parts[4]].filter(Boolean).join(' | ');
          etki = parts[5] || '';
        } else if (parts.length === 2) {
          title = parts[0];
          etki = parts[1];
        } else {
          title = parts[0];
        }
      } else {
        title = String(parts);
      }

      html += '<div class="strategy-card">';
      html += '<div class="strategy-card-top">';
      html += '<div class="strategy-card-num" style="background:' + color + '">' + num + '</div>';
      html += '<h4>' + escHtml(title) + '</h4>';
      if (etki) html += etkiBadge(etki);
      html += '</div>';
      if (desc) html += '<p>' + escHtml(desc) + '</p>';
      html += '</div>';
    });

    html += '</div></div>';
  });

  if (commonItems.length > 0) {
    html += '<div class="strategy-section">';
    html += '<div class="strategy-section-header" style="background:#34495E">Ortak Stratejiler</div>';
    html += '<div class="strategy-common"><ul>';
    commonItems.forEach(function(item) {
      html += '<li>' + escHtml(item) + '</li>';
    });
    html += '</ul></div></div>';
  }

  html += '</div>';
  return html;
}

// =====================================================================
// CONTENT RENDERER
// =====================================================================
function renderParsed(docConfig, parsed) {
  const filename = docConfig.file;
  const { headers, rows, textContent } = parsed;

  const isStrategy = filename.includes('24_strateji');

  let contentHtml = '';

  if (isStrategy) {
    contentHtml = renderStrategyFile(parsed.raw || textContent);
  } else {
    // Table
    if (headers.length > 0) {
      contentHtml += buildTable(headers, rows, filename);
    }
    // Analysis text
    if (textContent && textContent.trim()) {
      contentHtml += renderAnalysisText(textContent);
    }
    if (!contentHtml) {
      contentHtml = '<div class="error-box"><strong>Veri bulunamadı</strong>Dosya boş veya tanımlanamayan bir formatta.</div>';
    }
  }

  return contentHtml;
}

// =====================================================================
// EXPORT HELPERS
// =====================================================================
function getCurrentTSV() {
  const brand = BRANDS[currentBrand];
  const doc = brand.docs.find(function(d) { return d.id === currentDocId; });
  if (!doc || !cache.has(doc.file)) return { raw: '', file: doc ? doc.file : '' };
  return { raw: cache.get(doc.file).raw, file: doc.file };
}

function downloadCSV() {
  const { raw, file } = getCurrentTSV();
  if (!raw) { showToast('Veri henüz yüklenmedi. Lütfen bekleyin.'); return; }

  const lines = raw.split('\n');
  const csvLines = lines.map(function(line) {
    const cells = line.split('\t');
    return cells.map(function(cell) {
      const c = cell.replace(/"/g, '""');
      return /[,"\n\r]/.test(c) ? '"' + c + '"' : c;
    }).join(',');
  });

  const csvContent = csvLines.join('\n');
  const blob = new Blob(['\uFEFF' + csvContent], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = file.replace('.tsv', '.csv');
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function openInSheets() {
  const { raw, file } = getCurrentTSV();
  if (!raw) { showToast('Veri henüz yüklenmedi. Lütfen bekleyin.'); return; }

  // Build HTML table from TSV - Google Sheets pastes HTML tables perfectly
  const tsvLines = raw.split('\n').filter(function(l) { return l.trim() !== ''; });
  var htmlTable = '<meta charset="utf-8"><table>';
  tsvLines.forEach(function(line, i) {
    var cells = line.split('\t');
    var tag = i === 0 ? 'th' : 'td';
    htmlTable += '<tr>';
    cells.forEach(function(c) {
      htmlTable += '<' + tag + '>' + c.replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</' + tag + '>';
    });
    htmlTable += '</tr>';
  });
  htmlTable += '</table>';

  var brand = BRANDS[currentBrand];
  var doc = brand.docs.find(function(d) { return d.id === currentDocId; });
  var docName = doc ? doc.name : '';
  var sheetTitle = encodeURIComponent('Doğanlar Mobilya - ' + docName);

  // Try modern Clipboard API with HTML (best for Sheets paste)
  if (navigator.clipboard && navigator.clipboard.write && typeof ClipboardItem !== 'undefined') {
    var htmlBlob = new Blob([htmlTable], { type: 'text/html' });
    var textBlob = new Blob([raw], { type: 'text/plain' });
    navigator.clipboard.write([
      new ClipboardItem({
        'text/html': htmlBlob,
        'text/plain': textBlob
      })
    ]).then(function() {
      window.open('https://docs.google.com/spreadsheets/create?title=' + sheetTitle, '_blank');
      showToast('Veriler panoya kopyalandı. Sheets açılınca A1 hücresine tıklayıp Ctrl+V (⌘+V) yapın - tablo otomatik yerleşecek.');
    }).catch(function() {
      // Fallback to plain text copy
      fallbackCopyAndOpen(raw, sheetTitle);
    });
  } else {
    fallbackCopyAndOpen(raw, sheetTitle);
  }
}

function fallbackCopyAndOpen(raw, sheetTitle) {
  // Fallback: copy as plain text via textarea
  var ta = document.createElement('textarea');
  ta.value = raw;
  ta.style.position = 'fixed';
  ta.style.top = '-9999px';
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  window.open('https://docs.google.com/spreadsheets/create?title=' + sheetTitle, '_blank');
  showToast('Veriler panoya kopyalandı. Sheets açılınca A1 hücresine tıklayıp Ctrl+V (⌘+V) yapın.');
}

// =====================================================================
// TOAST
// =====================================================================
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(function() {
    el.classList.remove('show');
  }, 4000);
}

// =====================================================================
// STATE & RENDERING
// =====================================================================
let currentBrand = 'genel';
let currentDocId = '01';

function switchBrand(brand) {
  currentBrand = brand;
  currentDocId = BRANDS[brand].docs[0].id;

  document.querySelectorAll('.nav-tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelector('.nav-tab[data-brand="' + brand + '"]').classList.add('active');

  renderSidebar();
  renderContent();
}

function switchDoc(id) {
  currentDocId = id;
  renderSidebar();
  renderContent();
}

function renderSidebar() {
  const brand = BRANDS[currentBrand];
  const color = brand.color;

  const kpiHtml = brand.kpis.map(function(k) {
    return '<div class="kpi-chip"><div class="kpi-val" style="color:' + color + '">' + escHtml(k.val) + '</div><div class="kpi-lbl">' + escHtml(k.lbl) + '</div></div>';
  }).join('');

  const docsHtml = brand.docs.map(function(doc) {
    const active = doc.id === currentDocId ? 'active' : '';
    const iconBg = active ? color : 'rgba(255,255,255,0.07)';
    return '<div class="sidebar-item ' + active + '" onclick="switchDoc(\'' + doc.id + '\')">' +
      '<div class="doc-icon" style="background:' + iconBg + '">' + doc.icon + '</div>' +
      '<span class="doc-name">' + escHtml(doc.name) + '</span>' +
      '</div>';
  }).join('');

  document.getElementById('sidebar').innerHTML =
    '<div class="sidebar-header">' +
      '<div class="sidebar-brand-label">Seçili Marka</div>' +
      '<div class="sidebar-brand-name" style="color:' + color + '">' + escHtml(brand.label) + '</div>' +
    '</div>' +
    '<div class="sidebar-kpi">' + kpiHtml + '</div>' +
    '<div class="sidebar-docs">' +
      '<div class="sidebar-section-label">Belgeler</div>' +
      docsHtml +
    '</div>';
}

function renderContent() {
  const brand = BRANDS[currentBrand];
  const doc = brand.docs.find(function(d) { return d.id === currentDocId; });
  if (!doc) return;

  const color = brand.color;
  const badgeCls = currentBrand === 'lovayatak' ? 'badge-lovayatak' :
                   currentBrand === 'kelebek' ? 'badge-kelebek' :
                   currentBrand === 'dogtas' ? 'badge-dogtas' :
                   currentBrand === 'rakipler' ? 'badge-rakipler' : 'badge-genel';

  const headerHtml =
    '<div class="content-header">' +
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px">' +
        '<div>' +
          '<h1><span class="brand-accent" style="background:' + color + '"></span>' + escHtml(doc.name) + '</h1>' +
          '<p><span class="badge ' + badgeCls + '">' + escHtml(brand.label) + '</span></p>' +
        '</div>' +
        '<div class="action-bar">' +
          '<button class="action-btn sheets" onclick="openInSheets()">' +
            '<svg width="16" height="16" viewBox="0 0 24 24" fill="none">' +
              '<rect x="3" y="3" width="18" height="18" rx="2" fill="none" stroke="currentColor" stroke-width="2"/>' +
              '<line x1="3" y1="9" x2="21" y2="9" stroke="currentColor" stroke-width="1.5"/>' +
              '<line x1="3" y1="15" x2="21" y2="15" stroke="currentColor" stroke-width="1.5"/>' +
              '<line x1="9" y1="3" x2="9" y2="21" stroke="currentColor" stroke-width="1.5"/>' +
              '<line x1="15" y1="3" x2="15" y2="21" stroke="currentColor" stroke-width="1.5"/>' +
            '</svg>' +
            "Google Sheets'te Aç" +
          '</button>' +
          '<button class="action-btn csv" onclick="downloadCSV()">' +
            '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">' +
              '<path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>' +
              '<polyline points="7 10 12 15 17 10"/>' +
              '<line x1="12" y1="15" x2="12" y2="3"/>' +
            '</svg>' +
            'CSV İndir' +
          '</button>' +
        '</div>' +
      '</div>' +
    '</div>';

  const loadingHtml =
    '<div class="loading">' +
      '<div class="spinner"></div>' +
      '<p>Veri yükleniyor...</p>' +
    '</div>';

  const main = document.getElementById('main-content');
  main.innerHTML = headerHtml + loadingHtml;

  loadDoc(doc.file).then(function(result) {
    // Check if user navigated away
    const currentDoc = BRANDS[currentBrand].docs.find(function(d) { return d.id === currentDocId; });
    if (!currentDoc || currentDoc.file !== doc.file) return;

    const contentHtml = renderParsed(doc, result.parsed);
    main.innerHTML = headerHtml + contentHtml;
  }).catch(function(err) {
    const currentDoc = BRANDS[currentBrand].docs.find(function(d) { return d.id === currentDocId; });
    if (!currentDoc || currentDoc.file !== doc.file) return;

    main.innerHTML = headerHtml +
      '<div class="error-box">' +
        '<strong>Dosya yüklenemedi</strong>' +
        'Hata: ' + escHtml(err.message) + '<br>' +
        'Dosya yolu: <code>./seo-analiz/' + escHtml(doc.file) + '</code>' +
      '</div>';
  });
}

// Init
renderSidebar();
renderContent();
</script>
