// =====================================================================
// TABLE HELPERS
// =====================================================================
function fmtNum(n) {
  if (n === null || n === undefined || n === '' || n === '-') return '<span class="num-neutral">-</span>';
  const num = Number(String(n).replace(/[^0-9.-]/g,''));
  if (isNaN(num)) return n;
  return num.toLocaleString('tr-TR');
}

function pozClass(p) {
  const n = parseInt(p);
  if (isNaN(n)) return 'poz-low';
  if (n <= 3) return 'poz-top';
  if (n <= 10) return 'poz-mid';
  return 'poz-low';
}

function drBar(dr, color) {
  const pct = Math.min(100, (parseInt(dr) / 100) * 100);
  return `<div class="dr-bar-wrap"><strong>${dr}</strong><div class="dr-bar"><div class="dr-bar-fill" style="width:${pct}%;background:${color}"></div></div></div>`;
}

function winnerBadge(w) {
  if (!w || w === '-') return '<span class="num-neutral">-</span>';
  const cls = w.toLowerCase().includes('kelebek') ? 'winner-kelebek' :
               w.toLowerCase().includes('dogtas') ? 'winner-dogtas' :
               w.toLowerCase().includes('lova') ? 'winner-lovayatak' : '';
  return `<span class="${cls}">${w}</span>`;
}

function makeSortableTable(headers, rows, opts = {}) {
  let sortCol = opts.defaultSort !== undefined ? opts.defaultSort : -1;
  let sortDir = 1;

  function sorted(col, dir) {
    return [...rows].sort((a, b) => {
      let av = a[col], bv = b[col];
      const an = parseFloat(String(av).replace(/[^0-9.-]/g, ''));
      const bn = parseFloat(String(bv).replace(/[^0-9.-]/g, ''));
      if (!isNaN(an) && !isNaN(bn)) return dir * (an - bn);
      return dir * String(av).localeCompare(String(bv), 'tr');
    });
  }

  const id = 'tbl_' + Math.random().toString(36).slice(2);

  function renderTable(col, dir) {
    const data = col >= 0 ? sorted(col, dir) : rows;
    const tbody = data.map((r, ri) => {
      const cells = r.map((c, ci) => {
        let val = c;
        if (opts.renderCell) val = opts.renderCell(c, ci, r, ri);
        return `<td>${val}</td>`;
      }).join('');
      return `<tr>${cells}</tr>`;
    }).join('');

    const thead = headers.map((h, i) => {
      let cls = '';
      if (i === col) cls = dir === 1 ? 'sorted-asc' : 'sorted-desc';
      return `<th class="${cls}" onclick="sortTable('${id}',${i})">${h}<span class="sort-icon"></span></th>`;
    }).join('');

    return `<table id="${id}"><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table>`;
  }

  window['sortTable'] = window['sortTable'] || function() {};
  // store render fn
  window._tables = window._tables || {};
  window._tables[id] = { headers, rows, opts, sortCol, sortDir };

  const html = `<div class="table-wrap">${renderTable(sortCol, sortDir)}</div>`;
  // attach sort after render
  setTimeout(() => {
    const el = document.getElementById(id);
    if (!el) return;
    const t = window._tables[id];
    el.querySelectorAll('thead th').forEach((th, i) => {
      th.onclick = () => {
        if (t.sortCol === i) t.sortDir *= -1;
        else { t.sortCol = i; t.sortDir = 1; }
        const newHtml = renderTable2(t.headers, t.rows, t.opts, t.sortCol, t.sortDir, id);
        el.parentElement.innerHTML = newHtml;
        // reattach
        const el2 = document.getElementById(id);
        el2.querySelectorAll('thead th').forEach((th2, j) => {
          th2.onclick = () => { th.onclick && el.querySelectorAll('thead th')[j].onclick(); };
        });
        attachSort(id, t);
      };
    });
  }, 0);

  return html;
}

function renderTable2(headers, rows, opts, sortCol, sortDir, id) {
  function sorted() {
    if (sortCol < 0) return rows;
    return [...rows].sort((a, b) => {
      let av = a[sortCol], bv = b[sortCol];
      const an = parseFloat(String(av).replace(/[^0-9.-]/g, ''));
      const bn = parseFloat(String(bv).replace(/[^0-9.-]/g, ''));
      if (!isNaN(an) && !isNaN(bn)) return sortDir * (an - bn);
      return sortDir * String(av).localeCompare(String(bv), 'tr');
    });
  }
  const data = sorted();
  const tbody = data.map((r, ri) => {
    const cells = r.map((c, ci) => {
      let val = c;
      if (opts && opts.renderCell) val = opts.renderCell(c, ci, r, ri);
      return `<td>${val}</td>`;
    }).join('');
    return `<tr>${cells}</tr>`;
  }).join('');
  const thead = headers.map((h, i) => {
    let cls = '';
    if (i === sortCol) cls = sortDir === 1 ? 'sorted-asc' : 'sorted-desc';
    return `<th class="${cls}">${h}<span class="sort-icon"></span></th>`;
  }).join('');
  return `<table id="${id}"><thead><tr>${thead}</tr></thead><tbody>${tbody}</tbody></table>`;
}

function attachSort(id, t) {
  const el = document.getElementById(id);
  if (!el) return;
  el.querySelectorAll('thead th').forEach((th, i) => {
    th.onclick = () => {
      if (t.sortCol === i) t.sortDir *= -1;
      else { t.sortCol = i; t.sortDir = 1; }
      const newHtml = renderTable2(t.headers, t.rows, t.opts, t.sortCol, t.sortDir, id);
      el.parentElement.innerHTML = newHtml;
      attachSort(id, t);
    };
  });
}

function buildSortableTable(headers, rows, opts = {}) {
  const id = 'tbl_' + Math.random().toString(36).slice(2);
  const t = { headers, rows, opts, sortCol: opts.defaultSort !== undefined ? opts.defaultSort : -1, sortDir: -1 };
  const html = `<div class="table-wrap">${renderTable2(headers, rows, opts, t.sortCol, t.sortDir, id)}</div>`;
  setTimeout(() => attachSort(id, t), 0);
  return html;
}

}

// =====================================================================
// STATE & RENDERING
// =====================================================================
let currentBrand = 'genel';
let currentDocId = '01';

function switchBrand(brand) {
  currentBrand = brand;
  currentDocId = DATA[brand].docs[0].id;

  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.querySelector(`.nav-tab[data-brand="${brand}"]`).classList.add('active');

  renderSidebar();
  renderContent();
}

function switchDoc(id) {
  currentDocId = id;
  renderSidebar();
  renderContent();
}

function renderSidebar() {
  const brand = DATA[currentBrand];
  const color = brand.color;

  let kpiHtml = brand.kpis.map(k =>
    `<div class="kpi-chip"><div class="kpi-val" style="color:${color}">${k.val}</div><div class="kpi-lbl">${k.lbl}</div></div>`
  ).join('');

  let docsHtml = brand.docs.map(doc => {
    const active = doc.id === currentDocId ? 'active' : '';
    return `<div class="sidebar-item ${active}" onclick="switchDoc('${doc.id}')">
      <div class="doc-icon" style="background:${active ? color : 'rgba(255,255,255,0.07)'}">${doc.icon}</div>
      <span class="doc-name">${doc.name}</span>
      <span class="doc-id">${doc.id}</span>
    </div>`;
  }).join('');

  document.getElementById('sidebar').innerHTML = `
    <div class="sidebar-header">
      <div class="sidebar-brand-label">Secili Marka</div>
      <div class="sidebar-brand-name" style="color:${color}">${brand.label}</div>
    </div>
    <div class="sidebar-kpi">${kpiHtml}</div>
    <div class="sidebar-docs">
      <div class="sidebar-section-label">Belgeler</div>
      ${docsHtml}
    </div>
  `;
}

function renderContent() {
  const brand = DATA[currentBrand];
  const doc = brand.docs.find(d => d.id === currentDocId);
  if (!doc) return;

  const color = brand.color;
  const contentHtml = doc.render();

  document.getElementById('main-content').innerHTML = `
    <div class="content-header">
      <h1><span class="brand-accent" style="background:${color}"></span>${doc.name}</h1>
      <p><span class="badge badge-${currentBrand === 'lovayatak' ? 'lovayatak' : currentBrand === 'kelebek' ? 'kelebek' : currentBrand === 'dogtas' ? 'dogtas' : 'genel'}">${brand.label}</span> &nbsp; Belge #${doc.id}</p>
    </div>
    ${contentHtml}
  `;
}

// Init
renderSidebar();
renderContent();
</script>
